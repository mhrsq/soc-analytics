<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC Analytics — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e17;
      --card: #111827;
      --border: #1e293b;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.3);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --error: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridPulse 8s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ── Blue flame canvas (behind card) ── */
    #flameCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Ember / ash particles ── */
    .ember {
      position: fixed;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      filter: blur(0.5px);
      animation: emberRise linear infinite;
    }

    @keyframes emberRise {
      0%   { opacity: 0; transform: translateY(0) translateX(0) scale(1); }
      5%   { opacity: 0.9; }
      40%  { opacity: 0.7; }
      70%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-110vh) translateX(var(--drift)) scale(0.2); }
    }

    /* Glow layer at the bottom */
    .flame-glow {
      position: fixed;
      bottom: -40px;
      left: -10%;
      right: -10%;
      height: 350px;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 100% at 50% 100%,
        rgba(6, 182, 212, 0.40) 0%,
        rgba(6, 160, 220, 0.22) 25%,
        rgba(6, 120, 210, 0.10) 50%,
        transparent 70%);
      animation: glowPulse 2.5s ease-in-out infinite;
    }

    .flame-glow::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 120px;
      background: radial-gradient(ellipse 100% 100% at 50% 100%,
        rgba(100, 220, 255, 0.15) 0%,
        transparent 70%);
      animation: glowPulse2 1.8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.8; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.1); }
    }

    @keyframes glowPulse2 {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow:
        0 0 40px rgba(6, 182, 212, 0.05),
        0 25px 50px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanline 3s ease-in-out infinite;
    }

    @keyframes scanline {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent), #0891b2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px var(--accent-glow);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 30px var(--accent-glow); }
      50% { box-shadow: 0 0 50px var(--accent-glow), 0 0 80px rgba(6, 182, 212, 0.1); }
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      color: white;
    }

    .logo-section h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .logo-section p {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-wrapper input:focus + svg,
    .input-wrapper input:focus ~ svg {
      color: var(--accent);
    }

    .input-wrapper input::placeholder {
      color: #334155;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #0891b2);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-login .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.3s ease;
    }

    .error-msg.show { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .footer span {
      color: var(--accent);
      font-weight: 600;
    }

    /* Status indicator */
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <!-- Particles -->
  <script>
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      document.body.appendChild(p);
    }
  </script>

  <!-- Blue flame background -->
  <canvas id="flameCanvas"></canvas>
  <div class="flame-glow"></div>

  <!-- Ember / ash particles -->
  <script>
    for (let i = 0; i < 70; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      const size = 1.5 + Math.random() * 5;
      e.style.width = size + 'px';
      e.style.height = size + 'px';
      e.style.left = (5 + Math.random() * 90) + 'vw';
      e.style.bottom = (-8 + Math.random() * 15) + 'vh';
      e.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
      const dur = 3 + Math.random() * 6;
      e.style.animationDuration = dur + 's';
      e.style.animationDelay = (Math.random() * dur) + 's';
      // 65% bright cyan/blue embers with glow
      if (Math.random() < 0.65) {
        const b = 180 + Math.floor(Math.random() * 75);
        e.style.background = `rgba(${10 + Math.floor(Math.random()*30)}, ${b}, ${210 + Math.floor(Math.random()*45)}, 1)`;
        e.style.boxShadow = `0 0 ${4 + Math.random()*6}px rgba(6,182,212,0.8), 0 0 ${8 + Math.random()*8}px rgba(6,182,212,0.3)`;
      }
      // 20% white-hot center sparks
      else if (Math.random() < 0.55) {
        e.style.background = `rgba(200, 240, 255, 0.9)`;
        e.style.boxShadow = `0 0 ${3 + Math.random()*4}px rgba(180,230,255,0.7)`;
      }
      // 15% dim ash
      else {
        const g = 100 + Math.floor(Math.random() * 60);
        e.style.background = `rgba(${g}, ${g + 15}, ${g + 25}, 0.5)`;
      }
      document.body.appendChild(e);
    }
  </script>

  <!-- Flame canvas animation -->
  <script>
    (function() {
      const c = document.getElementById('flameCanvas');
      const ctx = c.getContext('2d');
      let W, H;

      function resize() {
        W = c.width = window.innerWidth;
        H = c.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      /* ── LAYER 1: Base flame pillars (big, soft, concentrated at bottom) ── */
      const pillars = [];
      const PILLAR_COUNT = 30;
      function spawnPillar() {
        const cx = W * 0.5;
        // Spawn mostly near center-bottom with some spread
        return {
          x: cx + (Math.random() - 0.5) * W * 0.9,
          y: H + Math.random() * 20,
          vx: (Math.random() - 0.5) * 0.4,
          vy: -(0.8 + Math.random() * 1.5),
          size: 80 + Math.random() * 120,
          life: 0,
          maxLife: 80 + Math.random() * 60,
          hue: 190 + Math.random() * 15,
          wobbleAmp: 0.3 + Math.random() * 0.8,
          wobbleSpd: 0.015 + Math.random() * 0.02,
          wobbleOff: Math.random() * Math.PI * 2,
        };
      }
      for (let i = 0; i < PILLAR_COUNT; i++) {
        const p = spawnPillar();
        p.life = Math.floor(Math.random() * p.maxLife);
        pillars.push(p);
      }

      /* ── LAYER 2: Active flames (medium, brighter, faster) ── */
      const flames = [];
      const FLAME_COUNT = 180;
      function spawnFlame() {
        return {
          x: Math.random() * W,
          y: H + Math.random() * 30,
          vx: (Math.random() - 0.5) * 1.5,
          vy: -(2.0 + Math.random() * 4.0),
          size: 18 + Math.random() * 40,
          life: 0,
          maxLife: 50 + Math.random() * 70,
          hue: 185 + Math.random() * 25,
          sat: 80 + Math.random() * 20,
          wobbleAmp: 0.8 + Math.random() * 2.0,
          wobbleSpd: 0.03 + Math.random() * 0.05,
          wobbleOff: Math.random() * Math.PI * 2,
        };
      }
      for (let i = 0; i < FLAME_COUNT; i++) {
        const f = spawnFlame();
        f.life = Math.floor(Math.random() * f.maxLife);
        flames.push(f);
      }

      /* ── LAYER 3: Hot sparks (tiny, bright, fast-rising) ── */
      const sparks = [];
      const SPARK_COUNT = 60;
      function spawnSpark() {
        return {
          x: Math.random() * W,
          y: H + Math.random() * 10,
          vx: (Math.random() - 0.5) * 2,
          vy: -(3 + Math.random() * 5),
          size: 2 + Math.random() * 5,
          life: 0,
          maxLife: 30 + Math.random() * 40,
          hue: 180 + Math.random() * 20,
        };
      }
      for (let i = 0; i < SPARK_COUNT; i++) {
        const s = spawnSpark();
        s.life = Math.floor(Math.random() * s.maxLife);
        sparks.push(s);
      }

      function drawFrame() {
        ctx.clearRect(0, 0, W, H);

        /* ── Draw base pillar glow (screen blend) ── */
        ctx.globalCompositeOperation = 'lighter';
        for (let i = 0; i < pillars.length; i++) {
          const p = pillars[i];
          p.life++;
          if (p.life > p.maxLife) { pillars[i] = spawnPillar(); continue; }

          const prog = p.life / p.maxLife;
          p.x += p.vx + Math.sin(p.life * p.wobbleSpd + p.wobbleOff) * p.wobbleAmp;
          p.y += p.vy;

          let alpha = prog < 0.15 ? prog / 0.15 : 1 - ((prog - 0.15) / 0.85);
          alpha *= 0.12;
          const sz = p.size * (1 - prog * 0.4);

          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz);
          g.addColorStop(0, `hsla(${p.hue}, 90%, 65%, ${alpha})`);
          g.addColorStop(0.5, `hsla(${p.hue + 5}, 80%, 45%, ${alpha * 0.4})`);
          g.addColorStop(1, 'hsla(200,80%,20%,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
          ctx.fill();
        }

        /* ── Draw active flames ── */
        for (let i = 0; i < flames.length; i++) {
          const f = flames[i];
          f.life++;
          if (f.life > f.maxLife) { flames[i] = spawnFlame(); continue; }

          const prog = f.life / f.maxLife;
          f.x += f.vx + Math.sin(f.life * f.wobbleSpd + f.wobbleOff) * f.wobbleAmp;
          f.y += f.vy;
          f.vy *= 0.996;

          let alpha = prog < 0.08 ? prog / 0.08 : 1 - ((prog - 0.08) / 0.92);
          alpha *= 0.28;
          const sz = f.size * (1 - prog * 0.55);

          const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, sz);
          g.addColorStop(0, `hsla(${f.hue}, ${f.sat}%, 75%, ${alpha})`);
          g.addColorStop(0.3, `hsla(${f.hue + 5}, ${f.sat}%, 55%, ${alpha * 0.7})`);
          g.addColorStop(0.7, `hsla(${f.hue + 10}, ${f.sat - 15}%, 35%, ${alpha * 0.25})`);
          g.addColorStop(1, 'hsla(210,60%,20%,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(f.x, f.y, sz, 0, Math.PI * 2);
          ctx.fill();
        }

        /* ── Draw hot sparks ── */
        for (let i = 0; i < sparks.length; i++) {
          const s = sparks[i];
          s.life++;
          if (s.life > s.maxLife) { sparks[i] = spawnSpark(); continue; }

          const prog = s.life / s.maxLife;
          s.x += s.vx;
          s.y += s.vy;
          s.vy *= 0.99;

          let alpha = prog < 0.1 ? prog / 0.1 : 1 - ((prog - 0.1) / 0.9);
          alpha *= 0.6;
          const sz = s.size * (1 - prog * 0.5);

          const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz);
          g.addColorStop(0, `hsla(${s.hue}, 100%, 85%, ${alpha})`);
          g.addColorStop(1, `hsla(${s.hue}, 90%, 50%, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(drawFrame);
      }

      drawFrame();
    })();
  </script>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>SOC Analytics</h1>
        <p>Security Operations Center</p>
      </div>

      <div id="error" class="error-msg"></div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
              autofocus
            />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          Sign In
        </button>
      </form>

      <div class="footer">
        <span class="status-dot"></span>
        Powered by <span>MTM</span> Security Operations
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('error');
    const btn = document.getElementById('btnLogin');

    // If already logged in, redirect to app
    if (localStorage.getItem('soc_token')) {
      validateAndRedirect();
    }

    async function validateAndRedirect() {
      const token = localStorage.getItem('soc_token');
      if (!token) return;
      try {
        const res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          localStorage.removeItem('soc_token');
          localStorage.removeItem('soc_user');
        }
      } catch {
        // Network error, stay on login
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Authenticating...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Authentication failed');
        }

        const data = await res.json();
        localStorage.setItem('soc_token', data.access_token);
        localStorage.setItem('soc_user', JSON.stringify(data.user));

        btn.innerHTML = '&#10003; Success! Redirecting...';
        btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

        setTimeout(() => {
          window.location.href = '/';
        }, 500);

      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
